<style>
@font-face {
    font-family: 'MyFont';
    src: url('font.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'MyFont', 'Segoe UI', Arial, sans-serif; }

body {
    background-color: #f0f2f5;
    color: #333;
    overflow-x: hidden;
    scroll-behavior: smooth;
    animation: fadeInBody 1.5s ease-in-out;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@keyframes fadeInBody {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #444, #000); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #666, #111); }

header {
    background: linear-gradient(270deg, #000, #222, #000);
    background-size: 600% 600%;
    animation: gradientBG 15s ease infinite, dropHeader 1.5s ease;
    color: white;
    text-align: center;
    padding: 20px 0;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
@keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%;} }
@keyframes dropHeader { from {transform: translateY(-100%);} to {transform: translateY(0);} }

header h1 { 
    font-size: 28px; 
    margin-bottom: 10px; 
    text-shadow: 1px 1px 5px rgba(0,0,0,0.5); 
    opacity: 0;
    animation: fadeInTitle 2s ease forwards;
}
@keyframes fadeInTitle { from {opacity: 0; transform: translateY(-15px);} to {opacity: 1; transform: translateY(0);} }

header img { width: 160px; border-radius: 12px; transition: transform 0.5s, filter 0.5s; }
header img:hover { transform: rotate(-10deg) scale(1.05); filter: drop-shadow(0 0 15px #fff); }

.menu-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; width: 35px; height: 25px; display: flex; flex-direction: column; justify-content: space-between; z-index: 1001; }
.menu-btn div { height: 4px; border-radius: 2px; background: linear-gradient(90deg, #fff, #ccc); transition: all 0.5s ease; }
.menu-btn.open div:nth-child(1){ transform: rotate(45deg) translate(6px,6px);}
.menu-btn.open div:nth-child(2){opacity:0;}
.menu-btn.open div:nth-child(3){ transform: rotate(-45deg) translate(7px,-7px);}

.sidebar-overlay{ position: fixed; top:0; left:0; width:0; height:100%; background-color: rgba(0,0,0,0.7); transition: width 0.5s ease; overflow:hidden; z-index:1000; }
.sidebar-overlay.active{ width:100%; }
.sidebar{ position: fixed; top:0; left:-320px; width:320px; height:100%; background: linear-gradient(180deg, #111, #333); box-shadow: 4px 0 25px rgba(0,0,0,0.5); padding-top:60px; transition:left 0.5s ease; display:flex; flex-direction:column; border-top-right-radius:15px; border-bottom-right-radius:15px; z-index:1000; }
.sidebar.active{ left:0; }
.sidebar a{ display:block; padding:18px 30px; color:#fff; text-decoration:none; font-weight:bold; margin:10px 15px; border-radius:12px; text-align:left; background: rgba(255,255,255,0.05); transition: all 0.4s ease; font-size:17px; transform: translateX(-20px); opacity:0; animation: fadeInSide 0.5s forwards; cursor: pointer; }
.sidebar.active a:nth-child(1){ animation-delay:0.1s; }
.sidebar.active a:nth-child(2){ animation-delay:0.2s; }
.sidebar.active a:nth-child(3){ animation-delay:0.3s; }
.sidebar.active a:nth-child(4){ animation-delay:0.4s; }
@keyframes fadeInSide{ to{ transform: translateX(0); opacity:1; } }
.sidebar a:hover{ background: rgba(255,255,255,0.25); transform: translateX(10px) scale(1.05); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

.apps-container{ 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
    gap: 30px; 
    padding: 50px 20px; 
    max-width: 900px; 
    margin: 0 auto;
    width: 100%;
    flex: 1 0 auto;
    align-items: start;
}
.app-card{ 
    background: linear-gradient(145deg,#fff,#f5f5f5); 
    border-radius: 28px; 
    box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
    text-align: center; 
    padding: 30px 20px; 
    transition: transform 0.4s ease, box-shadow 0.4s ease; 
    animation: fadeUp 0.8s ease backwards;
    max-width: 280px;
    margin: 0 auto;
    width: 100%;
}
@keyframes fadeUp { 
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);} 
}
.app-card:hover{ 
    transform: translateY(-12px); 
    box-shadow: 0 25px 45px rgba(0,0,0,0.2); 
    background: linear-gradient(145deg,#fff,#fafafa); 
}
.app-card img{ 
    width: 110px; 
    height: 110px; 
    object-fit: cover; 
    margin-bottom: 18px; 
    border-radius: 22px; 
    transition: transform 0.4s ease; 
}
.app-card img:hover{ transform: scale(1.05); }
.app-card h3{ font-size: 24px; margin-bottom: 12px; font-weight: 700; }
.app-card p{ font-size: 15px; margin-bottom: 22px; color: #555; line-height: 1.5; }
.app-card a{ 
    display: inline-block; 
    padding: 12px 28px; 
    background: linear-gradient(90deg,#000,#2c2c2c); 
    color: white; 
    text-decoration: none; 
    border-radius: 40px; 
    font-weight: bold; 
    font-size: 15px;
    transition: all 0.3s ease; 
}
.app-card a:hover{ 
    background: linear-gradient(90deg,#222,#000); 
    transform: scale(1.05); 
    box-shadow: 0 6px 14px rgba(0,0,0,0.2); 
}

footer{ 
    text-align: center; 
    padding: 22px 0; 
    background-color: #000; 
    color: white; 
    width: 100%; 
    margin-top: auto; 
    font-size: 14px;
    flex-shrink: 0;
    animation: riseFooter 1s ease;
}
@keyframes riseFooter { 
    from {transform: translateY(100%); opacity: 0;}
    to {transform: translateY(0); opacity: 1;} 
}

@media (max-width:650px){ 
    .sidebar{ width: 260px; } 
    .apps-container{ gap: 25px; padding: 35px 15px; }
    .app-card{ padding: 25px 15px; max-width: 260px; }
    .app-card img{ width: 95px; height: 95px; }
    .app-card h3{ font-size: 22px; }
}
</style>
</head>
<body>

<header>
    <div class="menu-btn" id="menu-btn" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </div>
    <h1>Raxford Apps</h1>
    <img src="https://www2.0zz0.com/2025/09/11/13/662006402.png" alt="Redbily Logo">
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <a href="index.html">خدمات الشركة</a>
    <a id="contactBtn">تواصل معنا</a>
    <a href="info.html">من نحن؟</a>
    <a href="Privacy_Policy.html">سياسة الخصوصية</a>
</div>

<div class="apps-container">
    <div class="app-card">
        <img src="https://l.top4top.io/p_3782a8gpv1.png" alt="REPI Logo">
        <h3>REPI</h3>
        <p>منصة تواصل تهدف لبيان طبيعة العلاقات بين الجنسين</p>
        <a href="https://www.babup.com/4Nbp/REPI.apk" target="_blank">تحميل</a>
    </div>
</div>

<footer>
    © 2026 Raxford Company - جميع الحقوق محفوظة
</footer>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
    document.getElementById('menu-btn').classList.toggle('open');
}

// تواصل معنا : تنبيه "قريباً"
const contactLink = document.getElementById('contactBtn');
if(contactLink) {
    contactLink.addEventListener('click', function(e) {
        e.preventDefault();
        alert("قريباً");
        if(document.getElementById('sidebar').classList.contains('active')) {
            toggleSidebar();
        }
    });
}
</script>
</body>
</html>
