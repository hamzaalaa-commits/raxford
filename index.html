<style>
@font-face {
    font-family: 'MyFont';
    src: url('font.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'MyFont', 'Segoe UI', 'Tahoma', Arial, sans-serif; }

body {
    background-color: #f0f2f5;
    color: #1e2a3e;
    overflow-x: hidden;
    scroll-behavior: smooth;
    animation: fadeInBody 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@keyframes fadeInBody {
    from {opacity: 0; transform: translateY(18px);}
    to {opacity: 1; transform: translateY(0);}
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3a3a3a, #000); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

header {
    background: linear-gradient(135deg, #0a0c10 0%, #1a1f2a 50%, #0a0c10 100%);
    background-size: 200% 200%;
    animation: gradientShift 12s ease infinite, dropHeader 0.9s ease-out;
    color: white;
    text-align: center;
    padding: 28px 20px;
    position: relative;
    box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
@keyframes gradientShift { 
    0% {background-position: 0% 0%}
    50% {background-position: 100% 20%}
    100% {background-position: 0% 0%}
}
@keyframes dropHeader { 
    from {transform: translateY(-100%); opacity: 0;}
    to {transform: translateY(0); opacity: 1;} 
}

header h1 { 
    font-size: 32px; 
    margin-bottom: 12px; 
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6); 
    opacity: 0;
    animation: fadeInTitle 1s forwards 0.2s;
}
@keyframes fadeInTitle { 
    from {opacity: 0; transform: translateY(-12px);} 
    to {opacity: 1; transform: translateY(0);} 
}

header img { 
    width: 150px; 
    border-radius: 20px; 
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,215,0,0.3);
}
header img:hover { 
    transform: scale(1.04) rotate(-2deg); 
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.5)); 
    border-color: rgba(255,215,0,0.7);
}

.menu-btn { 
    position: absolute; 
    top: 28px; 
    left: 24px; 
    cursor: pointer; 
    width: 36px; 
    height: 26px; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    z-index: 1001; 
    background: rgba(0,0,0,0.4);
    padding: 5px 8px;
    border-radius: 12px;
    transition: 0.2s;
}
.menu-btn div { 
    height: 3px; 
    border-radius: 4px; 
    background: linear-gradient(90deg, #ffffff, #e0e0e0); 
    transition: all 0.35s ease; 
}
.menu-btn.open div:nth-child(1){ transform: rotate(45deg) translate(6px,6px); background: #ffd966;}
.menu-btn.open div:nth-child(2){opacity:0;}
.menu-btn.open div:nth-child(3){ transform: rotate(-45deg) translate(7px,-7px); background: #ffd966;}

.sidebar-overlay{ 
    position: fixed; top:0; left:0; width:0; height:100%; 
    background-color: rgba(8, 8, 12, 0.85); 
    backdrop-filter: blur(4px);
    transition: width 0.4s ease; 
    overflow:hidden; z-index:1000; 
}
.sidebar-overlay.active{ width:100%; }
.sidebar{ 
    position: fixed; top:0; left:-320px; width:300px; height:100%; 
    background: linear-gradient(145deg, #101214, #1b1e24); 
    box-shadow: 8px 0 32px rgba(0,0,0,0.6); 
    padding-top: 70px; 
    transition: left 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
    display:flex; flex-direction:column; 
    border-top-right-radius: 28px; 
    border-bottom-right-radius: 28px; 
    z-index:1001; 
}
.sidebar.active{ left:0; }
.sidebar a{ 
    display:block; padding:14px 28px; color:#f0f0f0; text-decoration:none; 
    font-weight:600; margin:8px 18px; border-radius:40px; text-align:right;
    background: rgba(255,255,255,0.03); 
    transition: all 0.25s ease; 
    font-size: 18px;
    transform: translateX(-20px); opacity:0;
    animation: fadeInSide 0.4s forwards; cursor: pointer;
    border-right: 3px solid transparent;
}
.sidebar.active a:nth-child(1){ animation-delay:0.05s; }
.sidebar.active a:nth-child(2){ animation-delay:0.12s; }
.sidebar.active a:nth-child(3){ animation-delay:0.19s; }
.sidebar.active a:nth-child(4){ animation-delay:0.26s; }
@keyframes fadeInSide{ to{ transform: translateX(0); opacity:1; } }
.sidebar a:hover{ 
    background: rgba(255,215,0,0.15); 
    transform: translateX(5px) scale(1.02); 
    border-right-color: #ffd966;
    color: #ffea9e;
}

.apps-container{ 
    display: flex; 
    justify-content: center;
    align-items: center;
    padding: 50px 20px 70px; 
    max-width: 1100px; 
    margin: 0 auto;
    width: 100%;
    flex: 1 0 auto;
}
.app-card{ 
    background: linear-gradient(145deg, #ffffff, #f8fafc); 
    border-radius: 48px; 
    box-shadow: 0 30px 45px -15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.8); 
    text-align: center; 
    padding: 40px 28px 38px; 
    transition: all 0.35s ease; 
    animation: fadeUp 0.7s ease backwards;
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    backdrop-filter: blur(2px);
    border: 1px solid rgba(255,255,255,0.5);
}
@keyframes fadeUp { 
    from {opacity: 0; transform: translateY(50px) scale(0.96);}
    to {opacity: 1; transform: translateY(0) scale(1);} 
}
.app-card:hover{ 
    transform: translateY(-8px) scale(1.01); 
    box-shadow: 0 38px 55px -18px rgba(0,0,0,0.3); 
    background: #ffffff; 
}
.app-card img{ 
    width: 130px; 
    height: 130px; 
    object-fit: contain; 
    margin-bottom: 22px; 
    border-radius: 32px; 
    transition: transform 0.3s ease; 
    background: rgba(0,0,0,0.02);
    padding: 6px;
}
.app-card img:hover{ transform: scale(1.03) rotate(1deg); }
.app-card h3{ font-size: 32px; margin-bottom: 16px; font-weight: 800; background: linear-gradient(135deg, #1e2a3a, #0f172a); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; }
.app-card p{ font-size: 16px; margin-bottom: 28px; color: #334155; line-height: 1.55; font-weight: 500; }

/* حاوية الزر والرابط أسفله */
.button-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
}
.download-btn {
    display: inline-block; 
    padding: 14px 38px; 
    background: linear-gradient(105deg, #0b1120, #1e293b); 
    color: white; 
    text-decoration: none; 
    border-radius: 60px; 
    font-weight: bold; 
    font-size: 1.1rem;
    letter-spacing: 0.5px;
    transition: all 0.25s ease; 
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    width: fit-content;
    min-width: 160px;
    border: 1px solid rgba(255,215,0,0.3);
}
.download-btn:hover { 
    background: linear-gradient(105deg, #000000, #111827); 
    transform: scale(1.04); 
    box-shadow: 0 12px 22px rgba(0,0,0,0.3);
    border-color: #ffd966;
}
/* الرابط الأزرق القابل للضغط */
.repi-link {
    display: inline-block;
    font-size: 1.05rem;
    font-weight: 600;
    color: #1e88e5;
    background-color: rgba(30, 136, 229, 0.08);
    padding: 8px 20px;
    border-radius: 60px;
    text-decoration: none;
    transition: all 0.2s;
    direction: ltr;
    unicode-bidi: embed;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(30, 136, 229, 0.3);
}
.repi-link:hover {
    background-color: #1e88e5;
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(30,136,229,0.4);
    border-color: transparent;
}
/* تحسين المظهر للجوال */
@media (max-width:550px) {
    .repi-link { font-size: 0.9rem; padding: 6px 14px; }
    .download-btn { padding: 12px 30px; font-size: 1rem; }
    .app-card { padding: 30px 20px; max-width: 90%; }
    .app-card h3 { font-size: 28px; }
}

.toast {
    position: fixed;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #0f172ad9;
    backdrop-filter: blur(14px);
    color: #ffecb3;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: all 0.35s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    pointer-events: none;
    font-family: monospace;
    border-left: 5px solid #ffd966;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

footer{ 
    text-align: center; 
    padding: 24px 16px; 
    background: #0a0c10; 
    color: #b0b3b8; 
    width: 100%; 
    margin-top: auto; 
    font-size: 14px;
    flex-shrink: 0;
    border-top: 1px solid #23272e;
    font-weight: 500;
    letter-spacing: 0.3px;
}
</style>
</head>
<body>

<header>
    <div class="menu-btn" id="menu-btn" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </div>
    <h1>Raxford Team</h1>
    <img src="https://www2.0zz0.com/2025/09/11/13/662006402.png" alt="Redbily Logo">
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <a href="index.html">خدمات</a>
    <a id="contactBtn">تواصل معنا</a>
    <a href="info.html">من نحن؟</a>
    <a href="Privacy_Policy.html">سياسة الخصوصية</a>
</div>

<div class="toast" id="toast">✨ قريباً ✨</div>

<div class="apps-container">
    <div class="app-card">
        <img src="https://f.top4top.io/p_3809qwqto1.jpg" alt="REPI Logo">
        <h3>REPI V2</h3>
        <p>منصة تواصل تهدف لبيان طبيعة العلاقات بين الجنسين</p>
        
        <!-- تعديل دقيق: وضع زر التحميل ثم أسفله الرابط الأزرق القابل للضغط -->
        <div class="button-wrapper">
            <a href="https://www.dropbox.com/scl/fi/e3wa066yny3actcn90yyt/REPI-release.apk?rlkey=6tqraa38wtcki2wrlhdkwuh2n&st=1p9frqhk&dl=1" class="download-btn" target="_blank" rel="noopener noreferrer">تحميل</a>
            
            <!-- الرابط المطلوب: https://repi_social  لون أزرق وقابل للضغط (يفتح في نافذة جديدة) -->
            <a href="https://t.me/repi_social" class="repi-link" target="_blank" rel="noopener noreferrer">https://t.me/repi_social</a>
        </div>
    </div>
</div>

<footer>
    © 2026 Raxford Team - جميع الحقوق محفوظة
</footer>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
    menuBtn.classList.toggle('open');
}

// تواصل معنا: إظهار توست "قريباً"
const contactBtn = document.getElementById('contactBtn');
if (contactBtn) {
    contactBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2100);
    });
}

// إغلاق السايد بار عند النقر على رابط (للملاءمة)
const sidebarLinks = document.querySelectorAll('.sidebar a');
sidebarLinks.forEach(link => {
    link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            // اختياري: اغلاق القائمة بعد الضغط عدا الوصلات ذات الهاش أو الوقاية
            const sidebarActive = document.getElementById('sidebar').classList.contains('active');
            if (sidebarActive) {
                setTimeout(() => {
                    toggleSidebar();
                }, 80);
            }
        }
    });
});

// معالجة إضافية للرابط الأزرق: يفتح كما هو مطلوب مع نافذة جديدة، ويمنع أي أخطاء
document.querySelectorAll('.repi-link').forEach(link => {
    link.addEventListener('click', (e) => {
        // التأكد من أن الرابط يعمل بشكل طبيعي
        console.log('تم النقر على الرابط الأزرق:', link.href);
    });
});
</script>
</body>
</html>
