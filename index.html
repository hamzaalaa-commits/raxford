<style>
@font-face {
    font-family: 'MyFont';
    src: url('font.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    font-family: 'MyFont', 'Segoe UI', 'Cairo', Arial, sans-serif; 
}

body {
    background: linear-gradient(145deg, #f8fafc 0%, #eef2f5 100%);
    color: #1a2a3a;
    overflow-x: hidden;
    scroll-behavior: smooth;
    animation: fadeInBody 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

@keyframes fadeInBody {
    0% { opacity: 0; transform: translateY(35px); filter: blur(4px);}
    100% { opacity: 1; transform: translateY(0); filter: blur(0);}
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1e1e2f; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3a3a55, #1a1a2e); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #5a5a7a, #2a2a3e); }

header {
    background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
    color: white;
    text-align: center;
    padding: 28px 20px 32px;
    position: relative;
    box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    border-bottom: 2px solid rgba(255,215,0,0.3);
    overflow: hidden;
}

header::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0) 70%);
    animation: rotateShine 24s infinite linear;
    pointer-events: none;
}

@keyframes rotateShine {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}

header h1 { 
    font-size: 2.2rem; 
    letter-spacing: 2px;
    margin-bottom: 12px; 
    background: linear-gradient(135deg, #FFFFFF, #FFD966, #FFB347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    animation: fadeInTitle 1s ease forwards;
    position: relative;
    z-index: 2;
}

@keyframes fadeInTitle {
    from { opacity: 0; transform: translateY(-20px); letter-spacing: 5px;}
    to { opacity: 1; transform: translateY(0); letter-spacing: 2px;}
}

header img { 
    width: 150px; 
    border-radius: 28px; 
    transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border: 2px solid rgba(255,215,0,0.5);
}
header img:hover { 
    transform: scale(1.05) rotate(2deg); 
    filter: drop-shadow(0 0 18px #ffd966); 
    border-color: #ffd966;
}

.menu-btn { 
    position: absolute; 
    top: 28px; 
    left: 28px; 
    cursor: pointer; 
    width: 38px; 
    height: 26px; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    z-index: 1001;
    transition: all 0.2s;
}
.menu-btn div { 
    height: 4px; 
    border-radius: 4px; 
    background: linear-gradient(90deg, #FFD966, #FFFFFF);
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    width: 100%;
}
.menu-btn.open div:nth-child(1){ transform: rotate(45deg) translate(9px, 8px); background: #FFD966;}
.menu-btn.open div:nth-child(2){opacity:0; transform: translateX(-15px);}
.menu-btn.open div:nth-child(3){ transform: rotate(-45deg) translate(7px, -7px); background: #FFD966;}

.sidebar-overlay{ 
    position: fixed; 
    top:0; 
    left:0; 
    width:0; 
    height:100%; 
    background-color: rgba(0,0,0,0.8); 
    backdrop-filter: blur(6px);
    transition: width 0.5s ease; 
    overflow:hidden; 
    z-index:1000; 
}
.sidebar-overlay.active{ width:100%; }
.sidebar{ 
    position: fixed; 
    top:0; 
    left:-340px; 
    width:300px; 
    height:100%; 
    background: linear-gradient(165deg, #0d111c, #070b12);
    box-shadow: 8px 0 35px rgba(0,0,0,0.7); 
    padding-top: 80px; 
    transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
    display:flex; 
    flex-direction:column; 
    border-top-right-radius: 32px;
    border-bottom-right-radius: 32px;
    z-index:1000; 
    border-right: 1px solid #ffd96655;
}
.sidebar.active{ left:0; }
.sidebar a{ 
    display:block; 
    padding: 14px 28px; 
    color:#f0f0f0; 
    text-decoration:none; 
    font-weight:600; 
    margin:8px 18px; 
    border-radius:60px; 
    text-align:right; 
    background: rgba(255,255,255,0.03); 
    transition: all 0.3s ease; 
    font-size:1.05rem;
    transform: translateX(-25px);
    opacity:0;
    animation: slideMenu 0.4s forwards;
    backdrop-filter: blur(2px);
}
.sidebar.active a:nth-child(1){ animation-delay:0.08s; }
.sidebar.active a:nth-child(2){ animation-delay:0.16s; }
.sidebar.active a:nth-child(3){ animation-delay:0.24s; }
.sidebar.active a:nth-child(4){ animation-delay:0.32s; }
@keyframes slideMenu {
    to{ transform: translateX(0); opacity: 1; }
}
.sidebar a:hover{ 
    background: #ffd96622; 
    transform: translateX(8px) scale(1.02);
    color: #FFD966;
    border-right: 3px solid #FFD966;
    padding-right: 25px;
}

.apps-container{
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 55px 25px;
    max-width: 1000px;
    margin: 0 auto;
    flex: 1;
}
/* تصميم بطاقة REPI بشكل مميز */
.app-card {
    background: linear-gradient(145deg, #ffffff, #f9f9ff);
    border-radius: 42px;
    box-shadow: 0 30px 45px -20px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.7);
    text-align: center;
    padding: 35px 30px 40px;
    transition: transform 0.4s ease, box-shadow 0.5s ease;
    animation: fadeScaleUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    border: 1px solid rgba(255,215,0,0.3);
}
@keyframes fadeScaleUp {
    from { opacity: 0; transform: scale(0.92) translateY(40px);}
    to { opacity: 1; transform: scale(1) translateY(0);}
}
.app-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 40px 55px -18px rgba(0,0,0,0.45);
    border-color: #ffd966aa;
}

.app-card img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    margin-bottom: 20px;
    border-radius: 38px;
    transition: all 0.5s;
    box-shadow: 0 15px 28px rgba(0,0,0,0.2);
    border: 3px solid #ffd96655;
}
.app-card img:hover {
    transform: rotate(-3deg) scale(1.04);
    box-shadow: 0 0 0 4px rgba(255,217,102,0.5), 0 18px 32px black;
}

.app-card h3 {
    font-size: 2rem;
    margin: 15px 0 8px;
    background: linear-gradient(120deg, #2c3e4e, #1f2c38);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    letter-spacing: -0.5px;
}

.app-card p {
    font-size: 1rem;
    line-height: 1.55;
    margin-bottom: 28px;
    color: #2c3e50;
    font-weight: 500;
    background: #f0f3f8;
    padding: 10px 16px;
    border-radius: 60px;
    display: inline-block;
    max-width: 90%;
}

/* زر غير فعال مع نص "قريباً" */
.disabled-btn {
    display: inline-block;
    padding: 14px 32px;
    background: linear-gradient(135deg, #7f8c8d, #5d6d6e);
    color: #eef4ff;
    text-decoration: none;
    border-radius: 60px;
    font-weight: bold;
    font-size: 1.2rem;
    letter-spacing: 1px;
    cursor: not-allowed;
    opacity: 0.85;
    transition: 0.2s;
    border: none;
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
    pointer-events: none;  /* يجعل الزر غير فعال تمامًا */
    filter: grayscale(0.1);
    backdrop-filter: blur(2px);
}

.disabled-btn:hover {
    transform: none;
    box-shadow: none;
}

footer { 
    text-align: center; 
    padding: 22px 0; 
    background: #03060cee; 
    color: #ccddee; 
    margin-top: 20px;
    font-size: 0.9rem;
    border-top: 1px solid #ffd96640;
    backdrop-filter: blur(3px);
}

@media (max-width: 550px) {
    .apps-container { padding: 40px 20px; }
    .app-card { padding: 25px 18px; border-radius: 32px; }
    .app-card img { width: 120px; height: 120px; }
    .app-card h3 { font-size: 1.7rem; }
    .disabled-btn { font-size: 1rem; padding: 12px 24px; }
    header h1 { font-size: 1.6rem; }
    .sidebar { width: 270px; }
}

/* لمسات إضافية لتحسين الوصف */
.desc-badge {
    background: #e9ecef;
    border-radius: 40px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #1f3b4c;
}
</style>
</head>
<body>

<header>
    <div class="menu-btn" id="menu-btn" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </div>
    <h1>Raxford Apps</h1>
    <img src="https://www2.0zz0.com/2025/09/11/13/662006402.png" alt="شعار Raxford">

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">

        <img src="IMAGE/REPI.png" alt="REPI - منصة تواصل" onerror="this.onerror=null; this.src='https://placehold.co/400x400/2c3e50/FFD966?text=REPI';">

        <p style="font-size: 13px; background: none; padding: 0; margin-top: -8px; color: #4a627a;">✨ رؤية جديدة للتفاعل المجتمعي ✨</p>
        <!-- زر التحميل غير فعال مكتوب عليه "قريباً" بدلاً من تحميل -->
        <button class="disabled-btn">📱 قريباً</button>

</div>

<footer>
    © 2025 Raxford Company - جميع الحقوق محفوظة | منصة REPI قادمة قريباً
</footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
    menuBtn.classList.toggle('open');
}

// ضمان أن صورة REPI يتم تحميلها من المسار المطلوب "IMAGE/REPI.png"
// في حال عدم وجود الصورة حاليًا، يتم التعامل مع onerror ولكن يبقى المسار صحيح حسب الطلب.
// أيضًا إضافة تأثير عند تحميل الصفحة للتأكيد على عدم وجود أي كارد IQN
</script>
</body>
