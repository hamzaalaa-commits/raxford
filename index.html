<style>
@font-face {
    font-family: 'MyFont';
    src: url('font.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'MyFont', 'Segoe UI', 'Tahoma', Arial, sans-serif; }

body {
    background-color: #f0f2f5;
    color: #1e2a3e;
    overflow-x: hidden;
    scroll-behavior: smooth;
    animation: fadeInBody 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@keyframes fadeInBody {
    from {opacity: 0; transform: translateY(18px);}
    to {opacity: 1; transform: translateY(0);}
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3a3a3a, #000); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ==========================================================================
   تعديل الهيدر ليطابق ملف info تماماً (تصميم وشعار الوسطي)
   ========================================================================== */
header {
    background: linear-gradient(270deg, #000, #222, #000);
    background-size: 600% 600%;
    animation: gradientBG 15s ease infinite, dropHeader 1.5s ease;
    color: white; text-align: center; padding: 20px 0; position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
@keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
@keyframes dropHeader { from {transform: translateY(-100%);} to {transform: translateY(0);} }
header h1 { font-size: 28px; margin-bottom: 10px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); opacity: 0; animation: fadeInTitle 2s ease forwards; }
@keyframes fadeInTitle { from {opacity: 0; transform: translateY(-15px);} to {opacity: 1; transform: translateY(0);} }
header img { width: 160px; border-radius: 12px; transition: transform 0.5s, filter 0.5s; }
header img:hover { transform: rotate(-10deg) scale(1.05); filter: drop-shadow(0 0 15px #fff); }

/* زر القائمة الجانبية المطابق لملف info */
.menu-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; width: 35px; height: 25px; display: flex; flex-direction: column; justify-content: space-between; z-index: 1001; }
.menu-btn div { height: 4px; border-radius: 2px; background: linear-gradient(90deg, #fff, #ccc); transition: all 0.5s ease; }
.menu-btn.open div:nth-child(1){ transform: rotate(45deg) translate(6px,6px);}
.menu-btn.open div:nth-child(2){opacity:0;}
.menu-btn.open div:nth-child(3){ transform: rotate(-45deg) translate(7px,-7px);}

/* ==========================================================================
   تعديل السايد بار والأوفيرلاي ليطابق ملف info تماماً
   ========================================================================== */
.sidebar-overlay{ position: fixed; top:0; left:0; width:0; height:100%; background-color: rgba(0,0,0,0.7); transition: width 0.5s ease; overflow:hidden; z-index:1000; }
.sidebar-overlay.active{ width:100%; }
.sidebar{ position: fixed; top:0; left:-320px; width:320px; height:100%; background: linear-gradient(180deg, #111, #333); box-shadow: 4px 0 25px rgba(0,0,0,0.5); padding-top:60px; transition:left 0.5s ease; display:flex; flex-direction:column; border-top-right-radius:15px; border-bottom-right-radius:15px; z-index:1000; }
.sidebar.active{ left:0; }
.sidebar a{ display:block; padding:18px 30px; color:#fff; text-decoration:none; font-weight:bold; margin:10px 15px; border-radius:12px; text-align:left; background: rgba(255,255,255,0.05); transition: all 0.4s ease; font-size:17px; transform: translateX(-20px); opacity:0; animation: fadeInSide 0.5s forwards; }
.sidebar.active a:nth-child(1){ animation-delay:0.1s; }
.sidebar.active a:nth-child(2){ animation-delay:0.2s; }
.sidebar.active a:nth-child(3){ animation-delay:0.3s; }
.sidebar.active a:nth-child(4){ animation-delay:0.4s; }
@keyframes fadeInSide{ to{ transform: translateX(0); opacity:1; } }
.sidebar a:hover{ background: rgba(255,255,255,0.25); transform: translateX(10px) scale(1.05); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

/* بقية ستايلات كود الاندكس (محتوى البطاقات والزر الأزرق) */
.apps-container{ 
    display: flex; 
    justify-content: center;
    align-items: center;
    padding: 50px 20px 70px; 
    max-width: 1100px; 
    margin: 0 auto;
    width: 100%;
    flex: 1 0 auto;
}
.app-card{ 
    background: linear-gradient(145deg, #ffffff, #f8fafc); 
    border-radius: 48px; 
    box-shadow: 0 30px 45px -15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.8); 
    text-align: center; 
    padding: 40px 28px 38px; 
    transition: all 0.35s ease; 
    animation: fadeUp 0.7s ease backwards;
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    backdrop-filter: blur(2px);
    border: 1px solid rgba(255,255,255,0.5);
}
@keyframes fadeUp { 
    from {opacity: 0; transform: translateY(50px) scale(0.96);}
    to {opacity: 1; transform: translateY(0) scale(1);} 
}
.app-card:hover{ 
    transform: translateY(-8px) scale(1.01); 
    box-shadow: 0 38px 55px -18px rgba(0,0,0,0.3); 
    background: #ffffff; 
}
.app-card img{ 
    width: 130px; 
    height: 130px; 
    object-fit: contain; 
    margin-bottom: 22px; 
    border-radius: 32px; 
    transition: transform 0.3s ease; 
    background: rgba(0,0,0,0.02);
    padding: 6px;
}
.app-card img:hover{ transform: scale(1.03) rotate(1deg); }
.app-card h3{ font-size: 32px; margin-bottom: 16px; font-weight: 800; background: linear-gradient(135deg, #1e2a3a, #0f172a); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; }
.app-card p{ font-size: 16px; margin-bottom: 28px; color: #334155; line-height: 1.55; font-weight: 500; }

.button-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
}
.download-btn {
    display: inline-block; 
    padding: 14px 38px; 
    background: linear-gradient(105deg, #0b1120, #1e293b); 
    color: white; 
    text-decoration: none; 
    border-radius: 60px; 
    font-weight: bold; 
    font-size: 1.1rem;
    letter-spacing: 0.5px;
    transition: all 0.25s ease; 
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    width: fit-content;
    min-width: 160px;
    border: 1px solid rgba(255,215,0,0.3);
}
.download-btn:hover { 
    background: linear-gradient(105deg, #000000, #111827); 
    transform: scale(1.04); 
    box-shadow: 0 12px 22px rgba(0,0,0,0.3);
    border-color: #ffd966;
}
.repi-link {
    display: inline-block;
    font-size: 1.05rem;
    font-weight: 600;
    color: #1e88e5;
    background-color: rgba(30, 136, 229, 0.08);
    padding: 8px 20px;
    border-radius: 60px;
    text-decoration: none;
    transition: all 0.2s;
    direction: ltr;
    unicode-bidi: embed;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(30, 136, 229, 0.3);
}
.repi-link:hover {
    background-color: #1e88e5;
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(30,136,229,0.4);
    border-color: transparent;
}

@media (max-width:550px) {
    .repi-link { font-size: 0.9rem; padding: 6px 14px; }
    .download-btn { padding: 12px 30px; font-size: 1rem; }
    .app-card { padding: 30px 20px; max-width: 90%; }
    .app-card h3 { font-size: 28px; }
}

.toast {
    position: fixed;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #0f172ad9;
    backdrop-filter: blur(14px);
    color: #ffecb3;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: all 0.35s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    pointer-events: none;
    font-family: monospace;
    border-left: 5px solid #ffd966;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

footer{ 
    text-align: center; 
    padding: 24px 16px; 
    background: #0a0c10; 
    color: #b0b3b8; 
    width: 100%; 
    margin-top: auto; 
    font-size: 14px;
    flex-shrink: 0;
    border-top: 1px solid #23272e;
    font-weight: 500;
    letter-spacing: 0.3px;
}
@media (max-width:600px){ .sidebar{ width:250px; } }
</style>
</head>
<body>

<!-- الهيدر والزر متطابقين مع كود ملف info -->
<header>
    <div class="menu-btn" id="menu-btn" onclick="toggleSidebar()"><div></div><div></div><div></div></div>
    <h1>Raxford Team</h1>
    <img src="https://www2.0zz0.com/2025/09/11/13/662006402.png" alt="Redbily Logo">
</header>

<!-- السايد بار والغطاء الشفاف متطابقين مع كود ملف info -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <a href="index.html">خدمات</a>
    <a href="#" onclick="showToast(event)">تواصل معنا</a>
    <a href="info.html">من نحن؟</a>
    <a href="Privacy_Policy.html">سياسة الخصوصية</a>
</div>

<div class="toast" id="toast">✨ قريباً ✨</div>

<div class="apps-container">
    <div class="app-card">
        <img src="https://f.top4top.io/p_3809qwqto1.jpg" alt="REPI Logo">
        <h3>REPI V2.1</h3>
        <p>منصة تواصل تهدف لبيان طبيعة العلاقات بين الجنسين</p>
        
        <div class="button-wrapper">
            <a href="https://www.dropbox.com/scl/fi/srdmko90e8df88lx2fy0b/REPI-release.apk?rlkey=xl487vwagpviqzxb19ojgzhic&st=ay4lzp42&dl=1" class="download-btn" target="_blank" rel="noopener noreferrer">تحميل</a>
            <a href="https://t.me/repi_social" class="repi-link" target="_blank" rel="noopener noreferrer">https://t.me/repi_social</a>
        </div>
    </div>
</div>

<footer>
    © 2026 Raxford Team - جميع الحقوق محفوظة
</footer>

<!-- استخدام دالة الجافاسكريبت المطابقة لملف info لفتح وإغلاق القائمة بسلاسة -->
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
    document.getElementById('menu-btn').classList.toggle('open');
}

function showToast(event) {
    event.preventDefault();
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, 2100);
}
</script>
</body>
</html>
